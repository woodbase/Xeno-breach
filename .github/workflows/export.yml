name: Export Godot Project

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  GODOT_VERSION: "4.2.2"
  EXPORT_NAME: "xeno-breach"

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Web build
        run: |
          mkdir -v -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-web
          path: build/web

  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Windows build
        run: |
          mkdir -v -p build/windows
          godot --headless --export-release "Windows Desktop" \
            build/windows/${EXPORT_NAME}.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-windows
          path: build/windows

  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
             ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Linux build
        run: |
          mkdir -v -p build/linux
          godot --headless --export-release "Linux/X11" \
            build/linux/${EXPORT_NAME}.x86_64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-linux
          path: build/linux

  deploy-itch:
    name: Deploy to itch.io
    needs: [export-web, export-windows, export-linux]
    runs-on: ubuntu-latest
    permissions: {}
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ${{ env.EXPORT_NAME }}-web
          path: build/web

      - name: Download Windows artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ${{ env.EXPORT_NAME }}-windows
          path: build/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ${{ env.EXPORT_NAME }}-linux
          path: build/linux

      - name: Upload Web to itch.io
        uses: josephbmanley/butler-publish-itchio-action@v1.0.3
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: html5
          ITCH_GAME: xeno-breach
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: build/web
          VERSION: ${{ github.ref_name }}

      - name: Upload Windows to itch.io
        uses: josephbmanley/butler-publish-itchio-action@v1.0.3
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: windows
          ITCH_GAME: xeno-breach
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: build/windows
          VERSION: ${{ github.ref_name }}

      - name: Upload Linux to itch.io
        uses: josephbmanley/butler-publish-itchio-action@v1.0.3
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          CHANNEL: linux
          ITCH_GAME: xeno-breach
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: build/linux
          VERSION: ${{ github.ref_name }}
