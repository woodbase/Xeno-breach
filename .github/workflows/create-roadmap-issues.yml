name: Create Roadmap Issues

# Manually trigger this workflow once from the Actions tab.
# It reads docs/Roadmap-demo.md and creates:
#   - 8 GitHub Milestones (one per roadmap milestone)
#   - Labels (priority, story points, post-demo)
#   - 19 Issues, each assigned to a milestone with a checklist body
#   - A GitHub Project v2 ("Xeno Breach – Roadmap to Playable Demo")
#     with a Sprint iteration field (5 iterations) and every issue
#     assigned to the correct sprint.
#
# IMPORTANT: GitHub Projects v2 are created at the user/organisation level,
# so the default GITHUB_TOKEN does not have the necessary `project` scope.
# Before running this workflow, create a PAT (classic) with the `project`
# scope, or a Fine-Grained PAT with "Projects Read & Write" access, and
# store it as a repository secret named PROJECTS_RW_TOKEN.
on:
  workflow_dispatch:

jobs:
  create-roadmap:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run roadmap setup script
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_RW_TOKEN }}
        run: |
          python3 .github/scripts/create_roadmap_issues.py \
            --repo "${{ github.repository }}"
